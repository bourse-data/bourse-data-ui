server {
    listen 8081;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location /api/codal/ {
        proxy_pass http://codal-api:9002/codal/api/v1/;
        proxy_http_version 1.1;
        # Historical CODAL aggregation is intentionally rate-limited to one upstream
        # request per second and can legitimately take several minutes on a cold cache.
        proxy_connect_timeout 10s;
        proxy_send_timeout 30m;
        proxy_read_timeout 30m;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/data/ {
        proxy_pass http://bourse-data-api:9003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
